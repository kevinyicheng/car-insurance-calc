<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>車體險出險影響試算</title>
<style>
  body { margin: 0; }
  select { -webkit-appearance: menulist; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body>

<!-- Kevin Supply Hub Back Button -->
<style>
@keyframes ks-wiggle {
  0%,100% { transform: rotate(0deg) scale(1); }
  15%      { transform: rotate(-6deg) scale(1.05); }
  30%      { transform: rotate(5deg) scale(1.05); }
  45%      { transform: rotate(-4deg) scale(1.02); }
  60%      { transform: rotate(3deg) scale(1.02); }
  75%      { transform: rotate(-2deg) scale(1); }
}
.ks-back {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 12px 5px 5px;
  background: rgba(255,255,255,0.88);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(0,0,0,0.09);
  border-radius: 99px;
  text-decoration: none;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
  font-size: 12px;
  font-weight: 700;
  box-shadow: 0 2px 12px rgba(0,0,0,0.10);
  transition: transform 0.2s, box-shadow 0.2s;
  white-space: nowrap;
  transform-origin: left center;
}
.ks-back:hover {
  transform: scale(1.3);
  box-shadow: 0 6px 24px rgba(0,0,0,0.18);
}
.ks-back.wiggle {
  animation: ks-wiggle 0.6s ease;
}
.ks-back img { width: 26px; height: 26px; border-radius: 50%; display: block; }
</style>
<a class="ks-back" id="ksBack" href="https://kevinyicheng.github.io/kevin-supply-hub/">
  <img src="https://kevinyicheng.github.io/kevin-supply-hub/apple-touch-icon.png" alt="Kevin" />
  返回Kevin Supply Hub
</a>
<script>
(function(){
  const btn = document.getElementById('ksBack');
  function scheduleWiggle() {
    const delay = 4000 + Math.random() * 8000; // 4~12秒不定時
    setTimeout(function() {
      btn.classList.add('wiggle');
      btn.addEventListener('animationend', function onEnd() {
        btn.classList.remove('wiggle');
        btn.removeEventListener('animationend', onEnd);
        scheduleWiggle();
      });
    }, delay);
  }
  scheduleWiggle();
})();
</script>


</body>
</html>
